<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Simple Calculator </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }

         body {
             display: flex;
             justify-content: center;
             align-items: center;
             height: 100vh;
             background-color: #f4f4f9;
         }

        .calculator {
          background-color: #1e1e24;
          padding: 20px;
          border-radius: 16px;
          box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2)
          width: 320px;
        }

          #display {
            width: 100%;
            height: 70px;
            background-color: #2e2e38;
            border: none;
            outline: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
          }

          button {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3e3e4a;
            color: #ffffff;
            transition: background 0.2s;
          }

          button.operator {
            background-color: #4e4e5a;
          }

          button.operator {
            background-color: #ff9f0a;
            color: #ffffff;
          }

          button.operator:hover {
            background-color: #cc7f08;
          }

          button.clear {
            background-color: #ff3b30;
            color: #ffffff;
          }

          button.clear:hover {
            background-color: #cc2f26;
          }

          button.equal {
            background-color: #34c759;
            color: #ffffff;  
            grid-column: span 2;
          }

          button.equal:hover {
            background-color: #299e46;
          }
    </style>
</head>
<body>

  <div class="calculator">
    <!-- Display Screen -->
    <input type="text" id="display readonly placeholder="()">

    <!-- Button Layout -->
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="appendValue('/')">/</button>
      <button class="operator" onclick="appendValue('*')">*</button>
      <button class="operator" onclick="appendValue('-')">-</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="clear" onclick="appendValue('.')">.</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="clear onclick="appendValue('0')">0</button>

      <button class="equal" onclick="calculateResult()">=</button>
    </div>
 </div>

<script>
  const display = document.getElementaryById('display');

  // Adds numbers or operators to the screen //
  function appendValue(input) {
    display.value += input;
  }

  // Clears the entire screen //
  function clearDisplay() {
    display.value = ";
 }

 // Calulates the mathematical expression safely //
 function calculateResult() {
   try {
       // Eval evaluates the string mathe,apical expression //
          display.value = eval(display.value);
       } catch (error) {
          display.value = 'Error';
       }
     }
   </script>

</body>
</html>
