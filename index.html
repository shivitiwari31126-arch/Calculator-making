<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Simple Calculator </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }

         body {
             display: flex;
             justify-content: center;
             align-items: center;
             height: 100vh;
             background-color: #f4f4f9;
         }

        .calculator {
          background-color: #1e1e24;
          padding: 20px;
          border-radius: 16px;
          box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2)
          width: 320px;
        }

          #display {
            width: 100%;
            height: 70px;
            background-color: #2e2e38;
            border: none;
            outline: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
          }

          button {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3e3e4a;
            color: #ffffff;
            transition: background 0.2s;
          }

          button.operator {
            background-color: #4e4e5a;
          }

          button.operator {
            background-color: #ff9f0a;
            color: #ffffff;
          }

          
    </style>
</head>
